<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>💼 Career Coach</title>
  <style>
    body {font-family: system-ui; margin: 0; background: #f9fafb;}
    #topbar {padding: 10px 16px; background: #0078ff; color: white; display: flex; justify-content: space-between; align-items: center;}
    textarea {width: 100%; margin: 8px 0; padding: 8px; border-radius: 8px; border: 1px solid #ccc;}
    button {padding: 8px 14px; border-radius: 8px; border: none; background: #0078ff; color: white; cursor: pointer;}
    .card {border: 1px solid #eee; border-radius: 12px; padding: 12px; margin: 12px; background: #fff; position: relative;}
    input[type="file"] {margin: 8px 0;}
    #upload-status {font-weight: bold; color: green;}
    .delete-btn {position: absolute; top: 8px; right: 8px; background: none; border: none; color: #d00; font-size: 16px; cursor: pointer;}
    #clear-all {background: #dc3545; margin: 8px 0;}
  </style>
</head>
<body>
  <div id="topbar">
    <b>Career Coach</b>
    <button onclick="logout()">Logout</button>
  </div>

  <div style="padding:16px;">
    <label><b>📄 Upload your resume (PDF only):</b></label><br>
    <input type="file" id="resume" accept=".pdf"><br>
    <span id="upload-status"></span><br>

    <textarea id="msg" placeholder="Ask about jobs, e.g. 'Which roles suit me?'"></textarea>
    <br>
    <button id="send">Send</button>
    <button id="clear-all">🗑 Clear All Chats</button>

    <div id="out"></div>
  </div>

<script>
const API = "http://127.0.0.1:8000/api";
if (!localStorage.getItem("token")) {
  alert("Please sign in first!");
  window.location.href = "login.html";
}

let uploadedResume = localStorage.getItem("resume_path");

// Upload resume
async function uploadResume(file) {
  const formData = new FormData();
  formData.append("resume", file);
  const res = await fetch(`${API}/resume/upload`, {
    method: "POST",
    headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` },
    body: formData
  });
  const data = await res.json();
  if (data.path) {
    uploadedResume = data.path;
    localStorage.setItem("resume_path", uploadedResume);
    document.getElementById("upload-status").textContent = `✅ Uploaded: ${file.name}`;
  } else alert("Error uploading resume");
}

// Chat with AI and save
async function chat(message) {
  if (!uploadedResume) {
    alert("Please upload your resume first.");
    return;
  }

  const res = await fetch(`${API}/career`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${localStorage.getItem("token")}`
    },
    body: JSON.stringify({ message, resume_path: uploadedResume, job_posts: [] })
  });

  const data = await res.json();
  const reply = data.reply || "No response.";
  renderChat({ id: Date.now(), message, reply });

  await fetch(`${API}/chat/save`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${localStorage.getItem("token")}`
    },
    body: JSON.stringify({ message, reply })
  });
}

// Load history
async function loadHistory() {
  const res = await fetch(`${API}/chat/history`, {
    headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }
  });
  const data = await res.json();
  const chats = data.history || [];
  document.getElementById("out").innerHTML = "";
  chats.forEach(renderChat);
}

// Render single chat
function renderChat(chat) {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <button class="delete-btn" onclick="deleteChat(${chat.id}, this)">✖</button>
    <b>You:</b> ${chat.message}<br><br>
    <b>Assistant:</b><br>${chat.reply.replace(/\n/g, "<br>")}
  `;
  document.getElementById("out").prepend(div);
}

// Delete chat
async function deleteChat(id, el) {
  await fetch(`${API}/chat/delete/${id}`, {
    method: "DELETE",
    headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }
  });
  el.parentElement.remove();
}

// Clear all chats
async function clearAll() {
  if (!confirm("Delete all chats?")) return;
  await fetch(`${API}/chat/clear`, {
    method: "DELETE",
    headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }
  });
  document.getElementById("out").innerHTML = "";
}
document.getElementById("clear-all").onclick = clearAll;

// File upload listener
document.getElementById("resume").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (!file.name.endsWith(".pdf")) {
    alert("Only PDF files allowed!");
    return;
  }
  document.getElementById("upload-status").textContent = "⏳ Uploading...";
  await uploadResume(file);
});

document.getElementById("send").onclick = () => {
  const m = document.getElementById("msg").value.trim();
  if (m) chat(m);
};

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

// Init
if (uploadedResume) {
  document.getElementById("upload-status").textContent = "✅ Resume already uploaded.";
}
loadHistory();
</script>
</body>
</html>

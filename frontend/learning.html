<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>📘 Learning Buddy</title>
  <style>
    body {font-family: system-ui; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f9fafb;}
    #chat-container {flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column-reverse;}
    .msg {max-width: 80%; padding: 12px 16px; margin: 8px 0; border-radius: 12px; line-height: 1.4;}
    .user {background: #0078ff; color: white; align-self: flex-end;}
    .bot  {background: #e5e7eb; color: #111827; align-self: flex-start;}
    #input-area {display: flex; padding: 12px; border-top: 1px solid #ddd; background: white;}
    #msg {flex: 1; resize: none; border-radius: 8px; border: 1px solid #ccc; padding: 10px;}
    button {margin-left: 8px; padding: 10px 18px; border-radius: 8px; border: none; background: #0078ff; color: white; cursor: pointer;}
    #topbar {padding: 10px 16px; background: #0078ff; color: white; display: flex; justify-content: space-between; align-items: center;}
    .chat-item {background: #fff; border-radius: 8px; padding: 10px; margin: 8px 0; border: 1px solid #ddd; position: relative;}
    .delete-btn {position: absolute; right: 10px; top: 10px; background: none; border: none; color: red; font-size: 16px; cursor: pointer;}
    #history-controls {padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; background: #fff;}
    #clear-btn {background: red; color: white; border-radius: 6px; padding: 6px 12px; cursor: pointer; border: none;}
    .thinking {font-style: italic; color: #555; padding: 10px; margin: 8px; background: #fffbe6; border-radius: 8px; border: 1px solid #eee;}
  </style>
</head>
<body>
  <div id="topbar">
    <b>Learning Buddy</b>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="history-controls">
    <b>Chat History</b>
    <button id="clear-btn">🗑️ Clear All</button>
  </div>

  <div id="chat-container"></div>

  <div id="input-area">
    <textarea id="msg" placeholder="Ask about any topic..."></textarea>
    <button id="send">Send</button>
  </div>

<script>
if (!localStorage.getItem("token")) {
  alert("Please sign in first!");
  window.location.href = "login.html";
}

const API = "http://127.0.0.1:8000/api";
const token = localStorage.getItem("token");
const threadId = localStorage.getItem("learning_thread") || crypto.randomUUID();
localStorage.setItem("learning_thread", threadId);

const chatContainer = document.getElementById("chat-container");

// =====================
// Load Chat History
// =====================
async function loadHistory() {
  try {
    const res = await fetch(`${API}/chat/history`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    const data = await res.json();
    chatContainer.innerHTML = "";
    (data.history || []).forEach(item => {
      const div = document.createElement("div");
      div.className = "chat-item";
      div.innerHTML = `
        <div><b>You:</b> ${item.message}</div>
        <div><b>Assistant:</b> ${item.reply}</div>
        <button class="delete-btn" onclick="deleteChat(${item.id})">✖</button>
      `;
      chatContainer.prepend(div);
    });
  } catch (e) {
    console.error("Error loading history:", e);
  }
}

// =====================
// Send Chat
// =====================
async function chat(message) {
  const msgBox = document.getElementById("msg");
  const sendBtn = document.getElementById("send");
  msgBox.disabled = true;
  sendBtn.disabled = true;
  sendBtn.textContent = "Thinking...";

  const thinkingEl = document.createElement("div");
  thinkingEl.className = "thinking";
  thinkingEl.textContent = "🤔 Thinking...";
  chatContainer.prepend(thinkingEl);

  try {
    const r = await fetch(`${API}/learning`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ message, thread_id: threadId })
    });
    const data = await r.json();
    thinkingEl.remove();
    appendMessage(message, "user");
    appendMessage(data.reply || "(no reply)", "bot");

    // Save chat
    await fetch(`${API}/chat/save`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ message, reply: data.reply })
    });
  } catch (e) {
    thinkingEl.textContent = "⚠️ Network error: " + e.message;
  } finally {
    msgBox.disabled = false;
    sendBtn.disabled = false;
    sendBtn.textContent = "Send";
  }
}

function appendMessage(text, cls) {
  const el = document.createElement("div");
  el.className = `msg ${cls}`;
  el.innerHTML = text.replace(/\n/g, "<br>");
  chatContainer.prepend(el);
}

// =====================
// Delete single chat
// =====================
async function deleteChat(id) {
  if (!confirm("Delete this chat?")) return;
  await fetch(`${API}/chat/delete/${id}`, {
    method: "DELETE",
    headers: { "Authorization": `Bearer ${token}` }
  });
  await loadHistory();
}

// =====================
// Clear all chats
// =====================
document.getElementById("clear-btn").onclick = async () => {
  if (!confirm("Delete all chat history?")) return;
  await fetch(`${API}/chat/clear`, {
    method: "DELETE",
    headers: { "Authorization": `Bearer ${token}` }
  });
  await loadHistory();
};

// =====================
// Send message handler
// =====================
document.getElementById("send").onclick = () => {
  const m = document.getElementById("msg").value.trim();
  if (m) {
    chat(m);
    document.getElementById("msg").value = "";
  }
};

function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

// Load on start
loadHistory();
</script>
</body>
</html>
